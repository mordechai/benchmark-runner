apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: {{ dv_name }}
  namespace: {{ namespace }}
spec:
  source:
    registry:
      url: "docker://{{ image_source }}"
      pullMethod: {{ pull_method }}
  pvc:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: {{ root_disk_size }}
    storageClassName: {{ storage_class }}
