apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: {{ vm_name }}
  namespace: {{ namespace }}
  labels:
    app: {{ vm_name }}
    oadp-workload: "true"
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt.io/vm: {{ vm_name }}
        oadp-workload: "true"
    spec:
      domain:
        cpu:
          cores: {{ cpu_cores }}
        resources:
          requests:
            memory: {{ memory }}
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
              bootOrder: 1
            {% for disk in data_disks %}
            - name: {{ disk.name }}
              disk:
                bus: virtio
            {% endfor %}
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          dataVolume:
            name: {{ vm_name }}-rootdisk
        {% for disk in data_disks %}
        - name: {{ disk.name }}
          dataVolume:
            name: {{ vm_name }}-{{ disk.name }}
        {% endfor %}
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              user: {{ ssh_user }}
              {% if ssh_password %}
              password: {{ ssh_password }}
              chpasswd:
                expire: false
              ssh_pwauth: true
              {% elif not ssh_authorized_keys %}
              password: redhat
              chpasswd:
                expire: false
              ssh_pwauth: true
              {% else %}
              ssh_pwauth: false
              {% endif %}
              {% if ssh_authorized_keys %}
              ssh_authorized_keys:
                {% for key in ssh_authorized_keys %}
                - {{ key }}
                {% endfor %}
              {% endif %}
              {% if data_disks %}
              runcmd:
                {% for disk in data_disks %}
                {% if disk.filesystem and disk.mount_point %}
                - ['mkfs.{{ disk.filesystem }}', '-f', '/dev/disk/by-id/virtio-{{ disk.name }}']
                - ['mkdir', '-p', '{{ disk.mount_point }}']
                - ['mount', '/dev/disk/by-id/virtio-{{ disk.name }}', '{{ disk.mount_point }}']
                - ['bash', '-c', 'echo /dev/disk/by-id/virtio-{{ disk.name }} {{ disk.mount_point }} {{ disk.filesystem }} defaults 0 0 >> /etc/fstab']
                {% endif %}
                {% endfor %}
              {% endif %}
  dataVolumeTemplates:
    - metadata:
        name: {{ vm_name }}-rootdisk
      spec:
        source:
          pvc:
            name: {{ os_dv_name }}
            namespace: {{ namespace }}
        pvc:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: {{ root_disk_size }}
          storageClassName: {{ storage_class }}
    {% for disk in data_disks %}
    - metadata:
        name: {{ vm_name }}-{{ disk.name }}
      spec:
        source:
          blank: {}
        pvc:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: {{ disk.size }}
          storageClassName: {{ storage_class }}
    {% endfor %}
